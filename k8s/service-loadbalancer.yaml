# Public LoadBalancer for testing - CRM reachable at the ELB hostname
# Keep ClusterIP service for internal/ingress; this adds direct public access
apiVersion: v1
kind: Service
metadata:
  name: crm-public
  namespace: crm
  labels:
    app: crm
  annotations:
    # Internet-facing in public subnets (subnets tagged kubernetes.io/role/elb=1)
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    # TCP health check (avoids HTTP/TLS issues; ELB checks port is reachable)
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: TCP
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: crm
