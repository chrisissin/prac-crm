# Create this with: kubectl create secret generic crm-secrets --from-literal=...
# Or apply after encoding values in base64
apiVersion: v1
kind: Secret
metadata:
  name: crm-secrets
  namespace: crm
type: Opaque
stringData:
  DATABASE_USERNAME: "crm_app"
  DATABASE_PASSWORD: "changeme"      # Replace with actual password
  DATABASE_HOST: "10.0.1.50"         # MySQL master private IP from Terraform
  DATABASE_NAME: "crm_production"
  SECRET_KEY_BASE: "replace-with-rails-secret-key-base"
---
# Example: Create secret from literal (run manually)
# kubectl create secret generic crm-secrets -n crm \
#   --from-literal=DATABASE_USERNAME=crm_app \
#   --from-literal=DATABASE_PASSWORD=xxx \
#   --from-literal=DATABASE_HOST=10.0.1.50 \
#   --from-literal=DATABASE_NAME=crm_production \
#   --from-literal=SECRET_KEY_BASE=xxx \
#   --dry-run=client -o yaml | kubectl apply -f -
