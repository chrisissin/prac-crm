default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV["DATABASE_USERNAME"] || "root" %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: <%= ENV["DATABASE_HOST"] || "localhost" %>
  port: <%= ENV["DATABASE_PORT"] || 3306 %>
  reconnect: true

development:
  <<: *default
  database: crm_development
  ssl_mode: :disabled  # Disable SSL (MySQL 5.6 in Docker doesn't support it)

test:
  <<: *default
  database: crm_test
  ssl_mode: :disabled

production:
  <<: *default
  database: <%= ENV["DATABASE_NAME"] || "crm_production" %>
  ssl_mode: :disabled  # MySQL 5.6 on EC2 doesn't support SSL
